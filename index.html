<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#121212" />
    <title>ryhavean · playlist</title>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --spotify-black: #121212;
            --text-primary: #FFFFFF;
            --text-secondary: #B3B3B3;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--spotify-black);
            color: var(--text-primary);
            font-family: 'Figtree', sans-serif;
        }

        .dynamic-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(180deg, #2a3a3a 0%, #121212 100%);
            transition: background 0.8s ease;
        }

        .app {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            max-width: 450px; /* Mobil fokuslu en */
            margin: 0 auto;
            padding-bottom: 20px;
        }

        .top-bar {
            padding: 40px 20px 20px;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }

        .header-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
        }

        .profile-img { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; }
        .creator-info { font-size: 12px; color: rgba(255,255,255,0.9); }

        /* Daha uzun görünməsi üçün əsas hissəni genişləndiririk */
        .main-content {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center; /* Elementləri mərkəzdə saxlayaraq hündürlüyü doldurur */
            padding: 0 30px;
        }

        .album-cover-container {
            width: 100%;
            aspect-ratio: 1 / 0.8; /* Şəkildəki kimi bir az daha enli-düzbucaqlı cover */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            margin-bottom: 40px;
        }

        .album-img { width: 100%; height: 100%; object-fit: cover; }

        .song-info-row {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 30px;
        }

        .heart-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .heart-btn.liked { color: #fff; }
        .heart-btn svg { width: 32px; height: 32px; fill: currentColor; }
        .like-count { font-size: 14px; font-weight: 500; }

        .progress-container { margin-bottom: 30px; }
        .progress-rail { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .progress-fill { height: 100%; width: 35%; background: #fff; border-radius: 2px; position: relative; }
        .progress-fill::after {
            content: ''; position: absolute; right: -6px; top: -4px;
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
        }

        .time-labels {
            display: flex; justify-content: space-between;
            font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 12px;
        }

        .controls-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 40px;
        }

        .c-btn { background: none; border: none; color: #fff; cursor: pointer; }
        .play-btn {
            width: 80px; height: 80px; background: #fff; color: #000;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .play-btn svg { width: 35px; height: 35px; fill: #000; }
        .c-btn svg { width: 30px; height: 30px; fill: currentColor; }

        .playlist-section { padding: 0 25px; flex-shrink: 0; }
        .list-header { font-size: 12px; font-weight: 800; margin-bottom: 15px; letter-spacing: 1px; }
        
        .scroll-wrapper {
            display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none;
        }
        .scroll-wrapper::-webkit-scrollbar { display: none; }
        
        .list-item { flex: 0 0 110px; }
        .item-thumb { 
            width: 110px; height: 110px; border-radius: 10px; 
            object-fit: cover; opacity: 0.5; transition: 0.3s; 
        }
        .list-item.active .item-thumb { opacity: 1; transform: scale(1.05); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="dynamic-bg" id="bgLayer"></div>

    <div class="app">
        <div class="top-bar">
            <div class="header-profile">
                <img class="profile-img" src="https://i.ibb.co/mCMN0HHB/MG-0363.jpg">
                <div class="creator-info">creator <b>@ryhavean <\></b></div>
            </div>
        </div>

        <main class="main-content">
            <div class="album-cover-container">
                <img id="mainArt" class="album-img" src="https://picsum.photos/seed/ryh1/600">
            </div>

            <div class="song-info-row">
                <button class="heart-btn" id="heartBtn" onclick="toggleLike()">
                    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.27 2 8.5 2 5.41 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.41 22 8.5c0 3.77-3.4 6.86-8.55 11.53L12 21.35z"/></svg>
                    <span class="like-count" id="likeCount">160</span>
                </button>
            </div>

            <div class="progress-container">
                <div class="progress-rail"><div class="progress-fill"></div></div>
                <div class="time-labels"><span>0:02</span><span>3:31</span></div>
            </div>

            <div class="controls-row">
                <button class="c-btn"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 11.41l-1.41 1.41 3.13 3.13L14.5 22H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                <button class="c-btn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                <button class="c-btn play-btn">
                    <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="c-btn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="c-btn"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
            </div>
        </main>

        <section class="playlist-section">
            <h2 class="list-header">NEXT UP</h2>
            <div class="scroll-wrapper" id="listWrapper"></div>
        </section>
    </div>

    <script>
        const tracks = [1, 2, 3, 4, 5];
        const wrapper = document.getElementById('listWrapper');
        let likesData = JSON.parse(localStorage.getItem('ryh_likes')) || {};

        function renderList() {
            wrapper.innerHTML = tracks.map((t, i) => `
                <div class="list-item ${i === 1 ? 'active' : ''}">
                    <img class="item-thumb" src="https://picsum.photos/seed/ryh${t}/300">
                </div>
            `).join('');
        }

        function toggleLike() {
            const btn = document.getElementById('heartBtn');
            const count = document.getElementById('likeCount');
            const isLiked = btn.classList.toggle('liked');
            let currentLikes = parseInt(count.textContent);
            count.textContent = isLiked ? currentLikes + 1 : currentLikes - 1;
        }

        renderList();
    </script>
</body>
</html>
